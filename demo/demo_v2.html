<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>4K 像素对齐最终版 - v2</title>
    <style>
        /* 强制覆盖所有浏览器的默认 DPI 缩放行为 */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 3840px !important;
            height: 2160px !important;
            background: transparent !important;
            overflow: hidden !important;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .canvas-4k {
            position: relative;
            width: 3840px;
            height: 2160px;
            background: transparent;
        }

        .brand-color { color: #0C2B1B; }

        /* 逐字淡入 */
        .char-fade {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            animation: cubicCharIn 0.8s cubic-bezier(0.215, 0.610, 0.355, 1.000) forwards;
        }
        @keyframes cubicCharIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 4K 绝对像素排版：沉入白色玻璃卡片内部 */
        .header-section {
            position: absolute;
            top: 380px;  
            left: 270px; 
        }
        .main-title {
            font-size: 86px;
            font-weight: 700;
            letter-spacing: 4px;
            margin: 0 0 16px 0;
        }
        .sub-title {
            font-size: 26px;
            letter-spacing: 8px;
            opacity: 0.6;
            margin: 0;
        }

        /* 左侧不透明原画区 */
        .artwork-zone {
            position: absolute;
            top: 650px;
            left: 270px;
            width: 600px;
            height: 600px;
        }
        .opaque-artwork-main {
            position: absolute;
            top: 0;
            left: 0;
            width: 260px;
            height: 260px;
            background-color: #0C2B1B;
            border-radius: 54px;
            animation: zeroGFloatAlpha 8s ease-in-out infinite;
        }
        .opaque-artwork-sub {
            position: absolute;
            top: 280px;
            left: 220px;
            width: 130px;
            height: 130px;
            background-color: #0C2B1B;
            border-radius: 28px;
            opacity: 0.55;
            animation: zeroGFloatBeta 6s ease-in-out infinite;
        }

        @keyframes zeroGFloatAlpha {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }
        @keyframes zeroGFloatBeta {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(25px); }
        }

        /* 右侧核心数据展示面板 */
        .metrics-panel {
            position: absolute;
            top: 600px;
            left: 1750px; 
            width: 1300px;
            opacity: 0;
            animation: fadeInAll 1.2s 1.8s ease forwards;
        }
        .metric-block { margin-bottom: 80px; }
        .metric-value { font-size: 150px; font-weight: 800; line-height: 1; margin: 0; }
        .metric-label { font-size: 30px; margin-top: 16px; opacity: 0.8; }

        /* 底部长表单技术参数矩阵 */
        .bottom-matrix {
            position: absolute;
            bottom: 380px; 
            left: 270px;
            width: 3300px; 
            border-top: 4px solid rgba(12, 43, 27, 0.12); 
            padding-top: 50px;
            display: flex;
            justify-content: space-between;
            opacity: 0;
            animation: fadeInAll 1.2s 2.4s ease forwards;
        }
        .matrix-item { width: 30%; }
        .matrix-num { font-size: 60px; font-weight: 700; }
        .matrix-label { font-size: 24px; opacity: 0.6; margin-top: 12px; }

        @keyframes fadeInAll { to { opacity: 1; } }

        /* SVG 路径动态系统 */
        .svg-4k-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 3840px;
            height: 2160px;
            pointer-events: none;
        }
        .grow-path {
            stroke: #0C2B1B;
            stroke-width: 6;
            stroke-linecap: round;
            fill: none;
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
        }
        .grow-arrow { fill: #0C2B1B; transform: scale(0); transform-origin: 1710px 670px; }
        .grow-arrow-2 { fill: #0C2B1B; transform: scale(0); transform-origin: 1710px 890px; }
    </style>
</head>
<body>

    <div class="canvas-4k brand-color">
        <svg class="svg-4k-overlay">
            <path class="grow-path" d="M 530 750 C 900 750, 1300 670, 1710 670" />
            <polygon class="grow-arrow" points="1695,658 1715,670 1695,682" />

            <path class="grow-path" d="M 670 950 C 1000 950, 1300 890, 1710 890" />
            <polygon class="grow-arrow-2" points="1695,878 1715,890 1695,902" />
        </svg>

        <div class="header-section">
            <h1 class="main-title" id="lblMainTitle">大语言模型多模态认知解析架构</h1>
            <p class="sub-title" id="lblSubTitle">LARGE LANGUAGE MODEL COGNITIVE ENGINE PREVIEW</p>
        </div>

        <div class="artwork-zone">
            <div class="opaque-artwork-main"></div>
            <div class="opaque-artwork-sub"></div>
        </div>
            
        <div class="metrics-panel">
            <div class="metric-block">
                <div class="metric-value">99.42%</div>
                <div class="metric-label">语义上下文表征精准度 (Context Precision)</div>
            </div>
            <div class="metric-block">
                <div class="metric-value">1,200+</div>
                <div class="metric-label">多模态图形特征交叉注意节点 (Attention Anchors)</div>
            </div>
        </div>

        <div class="bottom-matrix">
            <div class="matrix-item">
                <div class="matrix-num">14.8 Tflops</div>
                <div class="matrix-label">单维矩阵算力吞吐</div>
            </div>
            <div class="matrix-item">
                <div class="matrix-num">0.02 ms</div>
                <div class="matrix-label">高维向量检索延迟</div>
            </div>
            <div class="matrix-item">
                <div class="matrix-num">4,096 Dim</div>
                <div class="matrix-label">隐层特征图谱维度</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const titleElement = document.getElementById('lblMainTitle');
            const subElement = document.getElementById('lblSubTitle');
            
            const prepareText = (el) => {
                const text = el.innerText.trim();
                el.innerHTML = '';
                return [...text].map(char => {
                    const span = document.createElement('span');
                    span.innerHTML = char === ' ' ? '&nbsp;' : char;
                    span.classList.add('char-fade');
                    el.appendChild(span);
                    return span;
                });
            };

            const mainChars = prepareText(titleElement);
            const subChars = prepareText(subElement);

            window.seekTime = function(currentTime) {
                mainChars.forEach((span, index) => {
                    const startDelay = index * 0.05;
                    const progress = Math.min(Math.max((currentTime - startDelay) / 0.6, 0), 1);
                    span.style.opacity = progress;
                    span.style.transform = `translateY(${(1 - progress) * 20}px)`;
                });

                subChars.forEach((span, index) => {
                    const startDelay = 0.5 + (index * 0.02);
                    const progress = Math.min(Math.max((currentTime - startDelay) / 0.5, 0), 1);
                    span.style.opacity = progress;
                    span.style.transform = `translateY(${(1 - progress) * 10}px)`;
                });

                const artworkMain = document.querySelector('.opaque-artwork-main');
                const artworkSub = document.querySelector('.opaque-artwork-sub');
                if(artworkMain) {
                    artworkMain.style.transform = `translateY(${Math.sin(currentTime * (Math.PI * 2 / 8)) * -30}px)`;
                }
                if(artworkSub) {
                    artworkSub.style.transform = `translateY(${Math.sin(currentTime * (Math.PI * 2 / 6)) * 25}px)`;
                }

                const paths = document.querySelectorAll('.grow-path');
                paths.forEach(path => {
                    const startDelay = 1.2;
                    const duration = 1.6;
                    if (currentTime >= startDelay) {
                        const progress = Math.min((currentTime - startDelay) / duration, 1);
                        path.style.strokeDashoffset = 1500 * (1 - progress);
                    } else {
                        path.style.strokeDashoffset = 1500;
                    }
                });

                const elementsToFade = document.querySelectorAll('.metrics-panel, .bottom-matrix, .grow-arrow, .grow-arrow-2');
                elementsToFade.forEach(el => {
                    const startDelay = 2.2;
                    if (currentTime >= startDelay) {
                        el.style.opacity = Math.min((currentTime - startDelay) / 0.8, 1);
                        if(el.tagName.toLowerCase() === 'polygon') el.style.transform = 'scale(1)';
                    } else {
                        el.style.opacity = 0;
                        if(el.tagName.toLowerCase() === 'polygon') el.style.transform = 'scale(0)';
                    }
                });
            };
            window.seekTime(0);
        });
    </script>
</body>
</html>
