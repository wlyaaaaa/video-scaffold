<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>4K 完美对齐融合层</title>
    <style>
        /* 🎯 强制全透明，允许底层视频流穿透 */
        html, body {
            margin: 0 !important; padding: 0 !important;
            width: 3840px !important; height: 2160px !important;
            background: transparent !important; 
            overflow: hidden !important;
            -webkit-font-smoothing: antialiased;
        }
        svg { width: 3840px; height: 2160px; display: block; background: transparent; }
    </style>
</head>
<body>

<svg viewBox="0 0 3840 2160">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>

    <filter id="brand-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0C2B1B" flood-opacity="0.15"/>
    </filter>

    <clipPath id="card-clip">
      <rect x="0" y="0" width="840" height="1200" rx="40"/>
    </clipPath>
  </defs>

  <g stroke="#0C2B1B" stroke-width="1.5" opacity="0.2" id="gridGroup">
    <line id="grid-h1" x1="200" y1="410" x2="3640" y2="410" />
    <line id="grid-h2" x1="200" y1="1810" x2="3640" y2="1810" />
    <line id="grid-v1" x1="1100" y1="410" x2="1100" y2="1810" stroke-dasharray="12 12" />
    <line id="grid-v2" x1="2760" y1="410" x2="2760" y2="1810" stroke-dasharray="12 12" />
  </g>

  <g opacity="0.15" id="ambientGroup">
    <path id="sakura1" d="M600,360 C630,330 660,360 645,390 C615,405 585,375 600,360 Z" fill="#f43f5e" transform-origin="600 360"/>
    <path id="sakura2" d="M3150,540 C3180,510 3210,540 3195,570 C3165,585 3135,555 3150,540 Z" fill="#f43f5e" transform-origin="3150 540"/>
  </g>

  <g transform="translate(240, 430)" id="headerGroup" filter="url(#brand-glow)">
    <text id="txt1" x="0" y="0" font-family="-apple-system, sans-serif" font-size="32" font-weight="900" fill="#f43f5e" letter-spacing="12">NEW CARD DEBUT</text>
    <text id="txt2" x="0" y="80" font-family="'Source Han Serif CN', 'Georgia', serif" font-size="76" font-weight="bold" fill="#0C2B1B" letter-spacing="3">新卡情报解禁</text>
    <line id="headerLine" x1="0" y1="105" x2="300" y2="105" stroke="#f43f5e" stroke-width="5"/>
  </g>

  <text id="txtSub" x="3600" y="510" font-family="-apple-system, sans-serif" font-size="28" fill="#0C2B1B" opacity="0.6" text-anchor="end" letter-spacing="3">DATABASE // CARD REVIEW</text>

  <g id="secLabels" opacity="0" fill="#0C2B1B">
    <text x="240" y="585" font-family="monospace" font-size="16" opacity="0.5">SEC_A // PHYSICAL_FRAME</text>
    <text x="1140" y="585" font-family="monospace" font-size="16" opacity="0.5">SEC_B // EFFECT_GRID</text>
    <text x="2820" y="585" font-family="monospace" font-size="16" opacity="0.5">SEC_C // EVALUATION_PANEL</text>
  </g>

  <g id="panelLeft">
    <rect x="-3" y="-3" width="846" height="1206" rx="43" fill="none" stroke="#0C2B1B" stroke-width="3" opacity="0.2"/>
    <g clip-path="url(#card-clip)">
      <rect width="840" height="1200" fill="#ffffff" opacity="0.1"/>
      <circle cx="420" cy="600" r="200" fill="none" stroke="#0C2B1B" stroke-width="2" opacity="0.15"/>
      <circle cx="420" cy="600" r="200" fill="none" stroke="#f43f5e" stroke-width="2" stroke-dasharray="8 8" opacity="0.2"/>
      <line x1="50" y1="600" x2="790" y2="600" stroke="#0C2B1B" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.15"/>
      <line x1="420" y1="100" x2="420" y2="1100" stroke="#0C2B1B" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.15"/>
      <text x="420" y="590" font-family="monospace" font-size="18" fill="#0C2B1B" text-anchor="middle" letter-spacing="3" opacity="0.4">WAITING FOR "card.png"</text>
      <text x="420" y="630" font-family="'PingFang SC', sans-serif" font-size="18" fill="#0C2B1B" text-anchor="middle" opacity="0.4">请将卡片命名为 card.png 放入同目录下</text>
    </g>
    <image x="0" y="0" width="840" height="1200" href="card.png" xlink:href="card.png" clip-path="url(#card-clip)"/>
  </g>
  <text id="cardFileLabel" x="240" y="1800" font-family="-apple-system, sans-serif" font-size="24" fill="#0C2B1B" opacity="0" letter-spacing="3">CARD FILE // PHYSICAL RENDERING</text>

  <g id="panelMid">
    <rect x="0" y="0" width="1560" height="1200" rx="40" fill="rgba(255,255,255,0.25)" stroke="#0C2B1B" stroke-width="2.5" opacity="0.85"/>
    <rect x="50" y="50" width="1460" height="100" rx="20" fill="#0C2B1B" opacity="0.05"/>
    <text x="90" y="115" font-family="-apple-system, sans-serif" font-size="42" font-weight="bold" fill="#0C2B1B">灰流丽 （同调形态）</text>
    <text x="1460" y="112" font-family="-apple-system, sans-serif" font-size="32" font-weight="bold" fill="#b45309" text-anchor="end">★6 炎属性 / 不死族</text>

    <g transform="translate(50, 220)" id="panelMidContent" opacity="0">
      <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="32" font-weight="bold" fill="#0C2B1B" opacity="0.7">【同调素材】 协调＋协调以外的怪兽１只以上</text>
      <line id="midLine" x1="0" y1="30" x2="1460" y2="30" stroke="#0C2B1B" stroke-width="2.5" opacity="0.2"/>
      <text x="0" y="90" font-family="-apple-system, sans-serif" font-size="32" fill="#be185d" font-weight="bold">这个卡名的①②的效果１回合各能使用１次。</text>
      <text x="0" y="170" font-family="-apple-system, sans-serif" font-size="35" font-weight="bold" fill="#0C2B1B">①：包含以下其中任意种效果的魔法・陷阱・怪兽的效果发动时，</text>
      
      <g>
        <rect x="0" y="200" width="500" height="54" rx="10" fill="#ffe4e6" opacity="0.85"/>
        <text x="20" y="238" font-family="-apple-system, sans-serif" font-size="32" font-weight="bold" fill="#9f1239">把场上的这张卡解放才能发动。</text>
        <text x="520" y="238" font-family="-apple-system, sans-serif" font-size="35" font-weight="bold" fill="#0C2B1B">那个效果无效。</text>
      </g>

      <g transform="translate(40, 310)">
        <line id="listLine" x1="0" y1="0" x2="0" y2="130" stroke="#fda4af" stroke-width="4" opacity="0.8"/>
        <circle cx="0" cy="0" r="10" fill="#ffffff" stroke="#be185d" stroke-width="5"/><text x="40" y="10" font-family="-apple-system, sans-serif" font-size="32" fill="#0C2B1B">从卡组把卡加入手卡的效果</text>
        <circle cx="0" cy="65" r="10" fill="#ffffff" stroke="#be185d" stroke-width="5"/><text x="40" y="75" font-family="-apple-system, sans-serif" font-size="32" fill="#0C2B1B">从卡组把怪兽特殊召唤的效果</text>
        <circle cx="0" cy="130" r="10" fill="#ffffff" stroke="#be185d" stroke-width="5"/><text x="40" y="140" font-family="-apple-system, sans-serif" font-size="32" fill="#0C2B1B">从卡组把卡送去墓地的效果</text>
      </g>

      <text x="0" y="550" font-family="-apple-system, sans-serif" font-size="35" font-weight="bold" fill="#0C2B1B">②：这张卡在墓地存在的场合，</text>
      <text x="0" y="605" font-family="-apple-system, sans-serif" font-size="32" fill="#0C2B1B" opacity="0.8">以自己墓地的１只攻击力0／守备力1800的等级3协调怪兽为对象才能发动。</text>
      <rect x="0" y="630" width="780" height="50" rx="6" fill="#fef08a" opacity="0.85"/>
      <text x="6" y="666" font-family="-apple-system, sans-serif" font-size="32" font-weight="bold" fill="#0C2B1B">那只怪兽加入手卡，这张卡从墓地特殊召唤。</text>
      
      <rect x="0" y="760" width="1460" height="90" rx="16" fill="rgba(12,43,27,0.05)" stroke="rgba(12,43,27,0.1)" stroke-width="2"/>
      <text x="30" y="815" font-family="-apple-system, sans-serif" font-size="28" fill="#0C2B1B" opacity="0.8">💡 战术备注：可精确回收原版《灰流丽》《屋敷童》《幽鬼兔》等全部手坑终端！</text>
    </g> 
  </g>

  <g id="panelRight">
    <rect x="0" y="0" width="720" height="1200" rx="40" fill="rgba(255,255,255,0.25)" stroke="#0C2B1B" stroke-width="2.5" opacity="0.85"/>
    <text x="360" y="90" font-family="-apple-system, sans-serif" font-size="40" font-weight="bold" fill="#0C2B1B" text-anchor="middle">UP主 战术锐评</text>
    <line id="rightLine" x1="90" y1="125" x2="630" y2="125" stroke="#0C2B1B" stroke-width="2" opacity="0.2"/>

    <g transform="translate(360, 280)" id="badgeGroup" opacity="0">
      <circle cx="0" cy="0" r="100" fill="none" stroke="#0C2B1B" stroke-width="2" opacity="0.2"/>
      <circle cx="0" cy="0" r="90" fill="none" stroke="url(#gold-grad)" stroke-width="5" stroke-dasharray="6 9"/>
      <text x="0" y="36" font-family="'Georgia', serif" font-size="110" font-weight="bold" fill="url(#gold-grad)" text-anchor="middle">S</text>
      <text x="0" y="135" font-family="-apple-system, sans-serif" font-size="24" fill="#0C2B1B" opacity="0.7" text-anchor="middle" letter-spacing="3">OVERALL RATING</text>
    </g>   

    <g transform="translate(75, 520)" id="faderGroup" opacity="0">
      <g transform="translate(0, 0)">
        <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="26" fill="#0C2B1B" opacity="0.8">阻抗强度 / Disruption</text>
        <line x1="0" y1="30" x2="570" y2="30" stroke="#0C2B1B" stroke-width="5" stroke-linecap="round" opacity="0.1"/>
        <line id="fader-fill-1" x1="0" y1="30" x2="0" y2="30" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
        <circle id="fader-knob-1" cx="0" cy="30" r="10" fill="#ef4444"/>
        <text x="570" y="0" font-family="-apple-system, sans-serif" font-size="26" font-weight="bold" fill="#ef4444" text-anchor="end">9.5</text>
      </g>
      <g transform="translate(0, 100)">
        <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="26" fill="#0C2B1B" opacity="0.8">展开兼容 / Combo</text>
        <line x1="0" y1="30" x2="570" y2="30" stroke="#0C2B1B" stroke-width="5" stroke-linecap="round" opacity="0.1"/>
        <line id="fader-fill-2" x1="0" y1="30" x2="0" y2="30" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
        <circle id="fader-knob-2" cx="0" cy="30" r="10" fill="#f59e0b"/>
        <text x="570" y="0" font-family="-apple-system, sans-serif" font-size="26" font-weight="bold" fill="#f59e0b" text-anchor="end">8.0</text>
      </g>
      <g transform="translate(0, 200)">
        <text x="0" y="0" font-family="-apple-system, sans-serif" font-size="26" fill="#0C2B1B" opacity="0.8">续航能力 / Loop</text>
        <line x1="0" y1="30" x2="570" y2="30" stroke="#0C2B1B" stroke-width="5" stroke-linecap="round" opacity="0.1"/>
        <line id="fader-fill-3" x1="0" y1="30" x2="0" y2="30" stroke="#10b981" stroke-width="5" stroke-linecap="round"/>
        <circle id="fader-knob-3" cx="0" cy="30" r="10" fill="#10b981"/>
        <text x="570" y="0" font-family="-apple-system, sans-serif" font-size="26" font-weight="bold" fill="#10b981" text-anchor="end">9.0</text>
      </g>
    </g>

    <g transform="translate(45, 840)" id="summaryGroup" opacity="0">
      <rect x="0" y="0" width="630" height="310" rx="20" fill="rgba(12,43,27,0.03)" stroke="rgba(12,43,27,0.1)" stroke-width="2"/>
      <line x1="1.5" y1="30" x2="1.5" y2="280" stroke="#f43f5e" stroke-width="8" stroke-linecap="round"/>
      <text x="45" y="145" font-family="'Times New Roman', Times, serif" font-size="180" font-weight="bold" fill="#fda4af" opacity="0.25">“</text>
      <text x="60" y="75" font-family="-apple-system, sans-serif" font-size="32" font-weight="bold" fill="#be185d">核心结论：</text>
      <text x="60" y="140" font-family="-apple-system, sans-serif" font-size="28" fill="#0C2B1B" font-weight="bold">这不仅是更主动的阻抗，</text>
      <text x="60" y="195" font-family="-apple-system, sans-serif" font-size="28" fill="#0C2B1B" font-weight="bold">更是手坑均卡组在终期</text>
      <text x="60" y="250" font-family="-apple-system, sans-serif" font-size="28" fill="#0C2B1B" font-weight="bold">展开的绝对终端和核心！</text>
    </g>
  </g>
</svg>

<script>
    // 🎛️ 时间轴高保真矩阵驱动器
    window.seekTime = function(t) {
        const setupLine = (id, length, delay, duration) => {
            const el = document.getElementById(id);
            if(!el) return;
            const progress = Math.min(Math.max((t - delay) / duration, 0), 1);
            el.style.strokeDasharray = length;
            el.style.strokeDashoffset = length * (1 - progress);
        };
        setupLine('grid-h1', 4000, 0, 3); setupLine('grid-h2', 4000, 0, 3);
        setupLine('grid-v1', 2000, 0.5, 2.5); setupLine('grid-v2', 2000, 0.5, 2.5);
        setupLine('headerLine', 500, 1.2, 1.5); setupLine('midLine', 1500, 2.5, 2);
        setupLine('listLine', 200, 3.5, 1.5); setupLine('rightLine', 600, 2.2, 1.8);

        const setFadeUp = (id, delay, baseTop = 0) => {
            const el = document.getElementById(id);
            if(!el) return;
            const progress = Math.min(Math.max((t - delay) / 3.0, 0), 1);
            el.style.opacity = progress;
            if(baseTop) el.style.transform = `translateY(${(1 - progress) * 30}px)`;
        };
        setFadeUp('headerGroup', 0.5, true); setFadeUp('txtSub', 0.8, true);
        setFadeUp('secLabels', 1.8, false); setFadeUp('cardFileLabel', 2.5, false);
        setFadeUp('panelMidContent', 2.5, false);

        // 🎯 慢漂基准位精准咬合视频背景卡片边界 (X轴内缩对齐)
        const floatPanel = (id, basePos, yAmp, rAmp, period, delay) => {
            const el = document.getElementById(id);
            if(!el) return;
            const fadeIn = Math.min(Math.max((t - delay) / 2.0, 0), 1);
            const y = Math.sin(t * (Math.PI * 2 / period)) * yAmp;
            const r = Math.sin(t * (Math.PI * 2 / (period + 2))) * rAmp;
            el.style.transform = `${basePos} translateY(${y}px) rotate(${r}deg)`;
            el.style.opacity = fadeIn;
        };
        floatPanel('panelLeft', 'translate(240px, 570px)', -20, 0.3, 14, 1.0);
        floatPanel('panelMid', 'translate(1120px, 570px)', -12, 0, 16, 1.3);
        floatPanel('panelRight', 'translate(2720px, 570px)', -16, -0.2, 12, 1.6);

        const setFader = (fillId, knobId, maxVal, delay) => {
            const fill = document.getElementById(fillId);
            const knob = document.getElementById(knobId);
            const progress = Math.min(Math.max((t - delay) / 3.5, 0), 1);
            const currentX = progress * maxVal;
            if(fill) { fill.setAttribute('x2', currentX); }
            if(knob) { knob.setAttribute('cx', currentX); }
        };
        setFader('fader-fill-1', 'fader-knob-1', 541.5, 4.0);
        setFader('fader-fill-2', 'fader-knob-2', 456, 4.3);
        setFader('fader-fill-3', 'fader-knob-3', 513, 4.6);

        setFadeUp('badgeGroup', 3.0, false); setFadeUp('faderGroup', 3.5, false); setFadeUp('summaryGroup', 5.0, false);

        document.getElementById('sakura1').style.transform = `translate(${Math.sin(t*0.5)*20}px, ${t*5}px) rotate(${t*15}deg)`;
        document.getElementById('sakura2').style.transform = `translate(${Math.cos(t*0.4)*15}px, ${t*4}px) rotate(${-t*10}deg)`;
    };
    window.seekTime(0);
</script>
</body>
</html>
