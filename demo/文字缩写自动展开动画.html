<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG 文字缩写自动展开动画 Demo</title>
    <style>
        /* 基础页面样式 */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f7f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .demo-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .title {
            font-size: 14px;
            color: #a0aec0;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        svg {
            background: #fafafa;
            border-radius: 12px;
            border: 1px solid #edf2f7;
        }

        /* ================= 自动动画核心 CSS ================= */

        /* 1. 定义关键帧动画：全拼后缀淡入并向右滑到原位 */
        @keyframes expandSuffix {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 2. 定义关键帧动画：各组字母向右平移腾出空间 */
        @keyframes moveEnB { to { transform: translateX(75px); } }
        @keyframes moveEnC { to { transform: translateX(175px); } }
        
        @keyframes moveZhB { to { transform: translateX(75px); } }
        @keyframes moveZhC { to { transform: translateX(120px); } }


        /* 3. 应用动画到元素 */
        
        /* 核心配置说明：
           - 0.6s: 动画持续时间
           - cubic-bezier(...): 弹性贝塞尔曲线，让展开有果冻质感
           - 1s: 【核心】动画延迟时间！页面加载 1 秒后自动执行。你可以改成 2s、3s 或 0s（立即执行）
           - forwards: 动画结束后停留在最后一帧（保持展开状态）
        */

        .suffix {
            opacity: 0;
            transform: translateX(-15px);
            animation: expandSuffix 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1s forwards;
        }

        /* 英文各组自动位移 */
        #en-b { animation: moveEnB 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1s forwards; }
        #en-c { animation: moveEnC 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1s forwards; }

        /* 中文各组自动位移 */
        #zh-b { animation: moveZhB 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1s forwards; }
        #zh-c { animation: moveZhC 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1s forwards; }

    </style>
</head>
<body>

<div class="demo-container">

    <div class="section">
        <div class="title">English: ABC → 自动展开 (1秒后触发)</div>
        <svg width="480" height="100" viewBox="0 0 480 100">
            <g font-size="36" font-weight="900" fill="#2d3748">
                <g id="en-a">
                    <text x="40" y="60">A</text>
                    <text x="68" y="60" class="suffix" fill="#3182ce" font-weight="500" font-size="32">pple</text>
                </g>
                
                <g id="en-b">
                    <text x="85" y="60">B</text>
                    <text x="112" y="60" class="suffix" fill="#3182ce" font-weight="500" font-size="32">anana</text>
                </g>
                
                <g id="en-c">
                    <text x="130" y="60">C</text>
                    <text x="158" y="60" class="suffix" fill="#3182ce" font-weight="500" font-size="32">herry</text>
                </g>
            </g>
        </svg>
    </div>

    <div class="section">
        <div class="title">中文: 计网安 → 自动展开 (1秒后触发)</div>
        <svg width="480" height="100" viewBox="0 0 480 100">
            <g font-size="36" font-weight="bold" fill="#2d3748" style="text-rendering: optimizeLegibility;">
                <g id="zh-a">
                    <text x="40" y="60">计</text>
                    <text x="80" y="60" class="suffix" fill="#e53e3e" font-weight="normal" font-size="32">算机</text>
                </g>
                
                <g id="zh-b">
                    <text x="95" y="60">网</text>
                    <text x="135" y="60" class="suffix" fill="#e53e3e" font-weight="normal" font-size="32">络</text>
                </g>
                
                <g id="zh-c">
                    <text x="150" y="60">安</text>
                    <text x="190" y="60" class="suffix" fill="#e53e3e" font-weight="normal" font-size="32">全</text>
                </g>
            </g>
        </svg>
    </div>

</div>

</body>
</html>
