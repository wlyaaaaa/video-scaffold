<!DOCTYPE html>
<html lang="zh-CN">
<!-- 4:3 cover. The MD game art (assets/场景0毛玻璃图.jpg) is used as a FROSTED-GLASS
     backdrop: cover-fit (uniform scale + crop, never distorted) -> blurred -> a light
     celadon scrim lifts it so the celadon title reads on top. Rendered to
     output/cover_4x3.png. @@ART@@ is replaced with the image file:// URI. -->
<head>
<meta charset="UTF-8">
<style>
  html,body{margin:0;padding:0;width:1600px;height:1200px;overflow:hidden;
    font-family:'Microsoft YaHei','PingFang SC',-apple-system,sans-serif;}
  .stage{position:relative;width:1600px;height:1200px;overflow:hidden;background:#eaf3ee;}
  /* frosted glass = blurred cover-fit art (scaled a touch so blur has no edge bleed) */
  .art{position:absolute;inset:-40px;background:url("@@ART@@") center/cover no-repeat;
    filter:blur(26px) saturate(1.12) brightness(1.06);transform:scale(1.12);}
  /* celadon scrim: heavier on the left (text) so the dark-green type stays crisp */
  .scrim{position:absolute;inset:0;
    background:linear-gradient(100deg, rgba(236,246,240,0.92) 0%, rgba(236,246,240,0.80) 46%, rgba(225,242,232,0.46) 100%);}
  .glow{position:absolute;inset:0;background:radial-gradient(60% 60% at 72% 32%, rgba(127,209,166,0.40), rgba(127,209,166,0) 70%);}
  .content{position:absolute;inset:0;}
  .kick{position:absolute;left:96px;top:118px;font-size:33px;font-weight:700;letter-spacing:9px;color:#1F7A4D;}
  .title{position:absolute;left:84px;top:198px;font-family:'Source Han Serif CN','Georgia',serif;
    font-size:208px;font-weight:900;letter-spacing:6px;line-height:1;
    background:linear-gradient(180deg,#0C2B1B,#1F7A4D);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .ul{position:absolute;left:98px;top:452px;width:330px;height:11px;border-radius:6px;background:#1F7A4D;}
  .hook{position:absolute;left:96px;top:560px;font-size:78px;font-weight:800;color:#0C2B1B;}
  .hook b{font-size:150px;font-weight:900;vertical-align:-30px;
    background:linear-gradient(180deg,#E7C56B,#B8862F);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .drop{position:absolute;left:98px;top:780px;font-size:44px;font-weight:700;color:#0C2B1B;opacity:.78;}
  .drop s{color:#C0392B;text-decoration-thickness:4px;}
  .pills{position:absolute;left:96px;top:900px;display:flex;gap:22px;}
  .pill{font-size:42px;font-weight:800;padding:14px 34px;border-radius:48px;}
  .pill.solid{background:#1F7A4D;color:#fff;}
  .pill.ghost{border:4px solid #1F7A4D;color:#0C2B1B;}
  .foot{position:absolute;left:98px;top:1052px;font-size:33px;color:#0C2B1B;opacity:.62;letter-spacing:1px;}
</style>
</head>
<body>
  <div class="stage">
    <div class="art"></div>
    <div class="scrim"></div>
    <div class="glow"></div>
    <div class="content">
      <div class="kick">游戏王 MASTER DUEL · 氪金指南</div>
      <div class="title">氪金指南</div>
      <div class="ul"></div>
      <div class="hook">1000 钻石，只要 <b>¥36</b></div>
      <div class="drop"><s>官方价 ¥50.48</s> ＝ 走官方线砍到 ¥36</div>
      <div class="pills">
        <div class="pill solid">100% 官方</div>
        <div class="pill ghost">不封号</div>
        <div class="pill ghost">不代充</div>
      </div>
      <div class="foot">原价 ¥50.48／千钻 · 走线倒余额，全流程实测拆解</div>
    </div>
  </div>
</body>
</html>
