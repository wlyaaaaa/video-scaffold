<!DOCTYPE html>
<html lang="zh-CN">
<!--
  4K cover board (opaque). Pure vector crystal-glass background + bold celadon
  title + hero art with a soft reflection. Rendered to a single 3840x2160 PNG
  by pipeline/cover.py. Placeholders: @@TITLE@@ @@SUBTITLE@@ @@KICKER@@ @@HERO@@
-->
<head>
<meta charset="UTF-8">
<style>
  html, body { margin:0; padding:0; width:3840px; height:2160px; overflow:hidden; }
  svg { width:3840px; height:2160px; display:block; }
</style>
</head>
<body>
<svg viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#f3fbf6"/>
      <stop offset="100%" stop-color="#e3f4ea"/>
    </linearGradient>
    <radialGradient id="glow" cx="68%" cy="40%" r="55%">
      <stop offset="0%"  stop-color="#7FD1A6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7FD1A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="crystal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#bdebd2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C2B1B"/>
      <stop offset="100%" stop-color="#1F7A4D"/>
    </linearGradient>
    <linearGradient id="reflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="reflect-clip"><rect x="2360" y="1500" width="1180" height="360"/></clipPath>
  </defs>

  <!-- crystal-glass vector background -->
  <rect width="3840" height="2160" fill="url(#bg)"/>
  <rect width="3840" height="2160" fill="url(#glow)"/>
  <path d="M0,1500 C 900,1320 1500,1820 2400,1560 S 3840,1380 3840,1560 L3840,2160 L0,2160 Z"
        fill="url(#crystal)"/>
  <path d="M0,1700 C 1100,1560 1700,1980 2700,1720 S 3840,1620 3840,1760 L3840,2160 L0,2160 Z"
        fill="#bdebd2" opacity="0.30"/>
  <path d="M2200,120 C 2700,360 3200,140 3720,420" stroke="#1F7A4D" stroke-width="4"
        fill="none" opacity="0.25"/>

  <!-- hero art + reflection -->
  <image href="@@HERO@@" xlink:href="@@HERO@@" x="2520" y="300" width="900" height="1260"/>
  <g clip-path="url(#reflect-clip)" transform="translate(0,3060) scale(1,-1)" opacity="0.5">
    <image href="@@HERO@@" xlink:href="@@HERO@@" x="2520" y="300" width="900" height="1260"/>
  </g>
  <rect x="2360" y="1500" width="1180" height="360" fill="url(#reflect)"/>

  <!-- title block (错落排版) -->
  <text x="300" y="760" font-family="-apple-system,sans-serif" font-size="64"
        fill="#1F7A4D" letter-spacing="22" font-weight="700">@@KICKER@@</text>
  <text x="288" y="1020" font-family="'Source Han Serif CN','Georgia',serif"
        font-size="320" font-weight="900" fill="url(#title-grad)" letter-spacing="4">@@TITLE@@</text>
  <rect x="300" y="1090" width="520" height="14" rx="7" fill="#1F7A4D"/>
  <text x="320" y="1260" font-family="'Source Han Serif CN','Georgia',serif"
        font-size="150" font-weight="700" fill="#0C2B1B" letter-spacing="6">@@SUBTITLE@@</text>
</svg>
</body>
</html>
