<!DOCTYPE html>
<html lang="zh-CN">
<!-- Bespoke 16:9 cover for 游戏王MD氪金指南. Pure vector celadon glass board,
     rendered to output/cover.png. Self-contained (no placeholders). -->
<head>
<meta charset="UTF-8">
<style>
  html,body{margin:0;padding:0;width:3840px;height:2160px;overflow:hidden;}
  svg{width:3840px;height:2160px;display:block;}
</style>
</head>
<body>
<svg viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="52%" stop-color="#f2faf5"/>
      <stop offset="100%" stop-color="#dff1e7"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="38%" r="58%">
      <stop offset="0%"  stop-color="#7FD1A6" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#7FD1A6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="crystal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#bdebd2" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0C2B1B"/>
      <stop offset="100%" stop-color="#1F7A4D"/>
    </linearGradient>
    <linearGradient id="gem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8FE0B6"/>
      <stop offset="100%" stop-color="#1F7A4D"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E7C56B"/>
      <stop offset="100%" stop-color="#B8862F"/>
    </linearGradient>
    <style>
      .sans{font-family:'Microsoft YaHei','PingFang SC',-apple-system,sans-serif;}
      .serif{font-family:'Source Han Serif CN','Georgia',serif;}
    </style>
  </defs>

  <!-- crystal-glass background -->
  <rect width="3840" height="2160" fill="url(#bg)"/>
  <rect width="3840" height="2160" fill="url(#glow)"/>
  <path d="M0,1560 C 900,1380 1500,1880 2400,1620 S 3840,1440 3840,1620 L3840,2160 L0,2160 Z" fill="url(#crystal)"/>
  <path d="M0,1760 C 1100,1620 1700,2040 2700,1780 S 3840,1680 3840,1820 L3840,2160 L0,2160 Z" fill="#bdebd2" opacity="0.30"/>
  <path d="M2150,150 C 2700,400 3250,170 3760,460" stroke="#1F7A4D" stroke-width="4" fill="none" opacity="0.22"/>

  <!-- ===================== LEFT: title block ===================== -->
  <text x="270" y="470" class="sans" font-size="74" fill="#1F7A4D" letter-spacing="20" font-weight="700">游戏王 MASTER DUEL</text>

  <text x="258" y="900" class="serif" font-size="340" font-weight="900" fill="url(#title-grad)" letter-spacing="8">氪金指南</text>
  <rect x="276" y="980" width="640" height="16" rx="8" fill="#1F7A4D"/>

  <!-- hero hook: 1000钻 只要 ¥36 -->
  <text x="270" y="1360" class="sans" font-size="140" font-weight="800" fill="#0C2B1B">1000 钻石，只要</text>
  <text x="1396" y="1360" class="sans" font-size="300" font-weight="900" fill="url(#gold)">¥36</text>

  <!-- reassurance pills -->
  <g class="sans" font-size="78" font-weight="800">
    <g transform="translate(270,1620)">
      <rect x="0" y="-86" width="470" height="128" rx="64" fill="#1F7A4D"/>
      <text x="235" y="2" fill="#ffffff" text-anchor="middle">100% 官方</text>
    </g>
    <g transform="translate(786,1620)">
      <rect x="0" y="-86" width="380" height="128" rx="64" fill="none" stroke="#1F7A4D" stroke-width="7"/>
      <text x="190" y="2" fill="#0C2B1B" text-anchor="middle">不封号</text>
    </g>
    <g transform="translate(1230,1620)">
      <rect x="0" y="-86" width="380" height="128" rx="64" fill="none" stroke="#1F7A4D" stroke-width="7"/>
      <text x="190" y="2" fill="#0C2B1B" text-anchor="middle">不代充</text>
    </g>
  </g>

  <text x="270" y="1900" class="sans" font-size="64" fill="#0C2B1B" fill-opacity="0.62" letter-spacing="2">官方原价 ¥50.48／千钻 · 走线倒余额，全流程实测拆解</text>

  <!-- ===================== RIGHT: gem + price drop ===================== -->
  <g transform="translate(2980,760)">
    <!-- diamond -->
    <path d="M0,-300 L300,-60 L0,440 L-300,-60 Z" fill="url(#gem)"/>
    <path d="M0,-300 L300,-60 L0,440 L-300,-60 Z" fill="none" stroke="#0C2B1B" stroke-opacity="0.18" stroke-width="6"/>
    <path d="M-300,-60 L300,-60 M0,-300 L-130,-60 L0,440 M0,-300 L130,-60 L0,440" stroke="#ffffff" stroke-opacity="0.45" stroke-width="5" fill="none"/>
    <text x="0" y="70" class="sans" font-size="150" font-weight="900" fill="#ffffff" text-anchor="middle">1000</text>
    <text x="0" y="200" class="sans" font-size="92" font-weight="700" fill="#eafff3" text-anchor="middle">钻 石</text>
  </g>

  <!-- official price struck through -->
  <g transform="translate(2980,1480)">
    <text x="0" y="0" class="sans" font-size="92" font-weight="700" fill="#C0392B" text-anchor="middle" fill-opacity="0.95">官方价 ¥50.48</text>
    <line x1="-360" y1="-26" x2="360" y2="-26" stroke="#C0392B" stroke-width="11"/>
    <text x="0" y="150" class="sans" font-size="80" font-weight="800" fill="#1F7A4D" text-anchor="middle">↓ 走官方线，砍到 ¥36</text>
  </g>
</svg>
</body>
</html>
